<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>WRKOS | Gallery</title>

<style>
*{
  box-sizing:border-box;
  margin:0;
  padding:0;
}

body{
  font-family:Arial, Helvetica, sans-serif;
  background:#000;
  color:#fff;
  overflow:hidden;
}

/* =========================
   TOPBAR
========================= */
.topbar{
  position:fixed;
  top:0;
  left:0;
  width:100%;
  padding:20px 30px;

  display:flex;
  justify-content:space-between;
  align-items:center;

  z-index:999;
}

.logo{
  display:flex;
  align-items:center;
  gap:10px;
}

.logo img{
  height:34px;
}

.logo span{
  font-size:14px;
  font-weight:700;
  letter-spacing:2px;
}

.back-btn{
  text-decoration:none;
  color:#fff;
  background:rgba(20,20,20,.6);
  backdrop-filter:blur(10px);
  padding:10px 16px;
  border-radius:999px;
  font-size:13px;
}

/* =========================
   LAYOUT
========================= */
.hero{
  width:100%;
  height:100vh;
  display:flex;
}

/* =========================
   LEFT PANEL
========================= */
.hero-right{
  width:520px;
  height:100vh;

  display:flex;
  flex-direction:column;

  padding:90px 40px 20px;

  background:#050505;

  border-right:1px solid rgba(255,255,255,.06);
}

.hero-right h2{
  font-size:38px;
}

.hero-right p{
  font-size:13px;
  color:#888;
  margin-bottom:18px;
}

/* SEARCH */
.search input{
  width:100%;
  padding:12px 14px;

  border-radius:10px;
  border:none;
  outline:none;

  background:#14141b;
  color:#fff;

  margin-bottom:16px;
}

/* LIST */
.list{
  flex:1;

  overflow:auto;

  display:flex;
  flex-direction:column;

  gap:12px;
  padding-right:4px;
}

/* =========================
   CARD
========================= */
.unit{
  position:relative;
  overflow:hidden;

  min-height:100px;

  display:flex;
  align-items:flex-end;

  padding:16px;
  border-radius:14px;

  cursor:pointer;

  border:1px solid rgba(255,255,255,.08);

  transition:.25s;

  isolation:isolate;
}

.unit::before{
  content:"";
  position:absolute;
  inset:0;

  background-image:var(--bg);
  background-size:cover;
  background-position:center;

  filter:blur(2px);
  transform:scale(1.1);

  z-index:-2;
}

.unit::after{
  content:"";
  position:absolute;
  inset:0;

  background:
    linear-gradient(
      to top,
      rgba(0,0,0,.9),
      rgba(0,0,0,.35)
    );

  z-index:-1;
}

.unit:hover{
  transform:translateY(-2px);
  border-color:rgba(255,255,255,.18);
}

.unit-info h3{
  font-size:18px;
  margin-bottom:3px;
}

.unit-info span{
  font-size:12px;
  color:#bdbdbd;
}

/* FOOTER */
.footer{
  margin-top:10px;
  font-size:11px;
  color:#666;
}

/* =========================
   RIGHT GALLERY
========================= */
.hero-left{
  flex:1;
  position:relative;
  overflow:hidden;
  background:#000;
}

/* background */
#bg{
  width:100%;
  height:100%;

  object-fit:cover;
  object-position:center;

  transition:.3s;
}

#bg[src=""]{
  opacity:0;
}

/* dark overlay */
.hero-left::after{
  content:"";
  position:absolute;
  inset:0;

  background:
    linear-gradient(
      to top,
      rgba(0,0,0,.92),
      rgba(0,0,0,.35)
    );

  pointer-events:none;
}

/* CONTENT */
.profile{
  position:absolute;

  left:60px;
  top:120px;
  bottom:40px;

  width:calc(100% - 120px);

  display:flex;
  flex-direction:column;

  z-index:2;
}

.profile h1{
  font-size:62px;
}

.profile p{
  color:#bbb;
  margin-top:6px;
  line-height:1.5;
}

/* GALLERY */
.gallery{
  margin-top:22px;

  flex:1;

  overflow:auto;

  display:grid;

  grid-template-columns:
    repeat(auto-fill,minmax(220px,1fr));

  gap:14px;
}

/* IMAGE */
.gallery img{
  width:100%;
  height:240px;

  object-fit:cover;

  border-radius:16px;

  cursor:pointer;

  transition:.25s;

  background:#111;

  border:1px solid rgba(255,255,255,.06);
}

.gallery img:hover{
  transform:scale(1.02);
  border-color:rgba(255,255,255,.2);
}

/* =========================
   MOBILE PREVIEW
========================= */
.mobile-preview{
  display:none;
  padding:100px 20px 30px;
}

.mobile-profile{
  margin-top:20px;
}

.mobile-profile h1{
  font-size:34px;
}

.mobile-profile p{
  color:#aaa;
  margin-top:8px;
  line-height:1.5;
}

.mobile-gallery{
  margin-top:20px;

  display:grid;
  grid-template-columns:1fr 1fr;
  gap:10px;
}

.mobile-gallery img{
  width:100%;
  height:180px;
  object-fit:cover;

  border-radius:14px;

  border:1px solid rgba(255,255,255,.08);
}

/* =========================
   VIEWER
========================= */
.viewer{
  position:fixed;
  inset:0;

  display:none;
  z-index:9999;
}

.viewer::before{
  content:"";
  position:absolute;
  inset:0;
  background:rgba(0,0,0,.8);
  backdrop-filter:blur(10px);
}

.viewer img{
  position:absolute;
  left:50%;
  top:50%;
  transform:translate(-50%,-50%);

  width:85%;
  max-width:1200px;
  max-height:90%;

  object-fit:contain;
  border-radius:16px;

  box-shadow:0 40px 120px rgba(0,0,0,.7);
}

/* =========================
   MOBILE
========================= */
@media(max-width:900px){

  body{
    overflow:auto;
  }

  .hero{
    flex-direction:column;
    height:auto;
  }

  /* LEFT PANEL */
  .hero-right{
    width:100%;
    height:auto;
    min-height:auto;

    padding:
      90px 20px 20px;
  }

  /* hide mobile ui on desktop */
.mobile-preview{
  display:none;
}

/* hide desktop ui on mobile */
.hero{
  display:none;
}

/* show mobile ui */
.mobile-preview{
  display:block;
}
  /* RIGHT PANEL */
  .hero-left{

    display:block;

    width:100%;
    min-height:100vh;

    position:relative;
  }

  /* background */
  #bg{
    position:absolute;
    inset:0;
    height:100%;
  }

  /* profile */
  .profile{

    position:relative;

    left:auto;
    top:auto;
    bottom:auto;

    width:100%;

    padding:40px 20px 30px;
  }

  .profile h1{
    font-size:38px;
  }

  .profile p{
    font-size:14px;
  }

  /* gallery */
  .gallery{

    grid-template-columns:
      repeat(2,1fr);

    gap:10px;
  }

  .gallery img{
    height:170px;
    border-radius:12px;
  }

  /* viewer full */
  .viewer{
    width:100%;
    height:100%;
    position:fixed;
    inset:0;
  }

  .viewer img{
    width:92%;
    max-height:85%;
  }
}
</style>
</head>

<body>

<div class="topbar">

  <a class="back-btn" href="../index.html">
    ← Back
  </a>

  <div class="logo">
    <img src="../iaf-logo.png">
    <span>WRKOS</span>
  </div>

</div>

<!-- =========================
     DESKTOP
========================= -->
<section class="hero">

<!-- LEFT -->
<div class="hero-right">

  <h2>Image Gallery</h2>
  <p>IAF | Personnel visual archive</p>

  <div class="search">
    <input
      id="search"
      placeholder="Search unit..."
      oninput="filterUnits()"
    >
  </div>

  <div class="list" id="list"></div>

  <div class="footer">
    © 2026 IAF Digital Engineering — WRKOS
  </div>

</div>

<!-- RIGHT -->
<div class="hero-left">

  <img id="bg" src="">

  <div class="profile">

    <h1 id="name">SELECT UNIT</h1>

    <p id="desc">
      Personnel image gallery will appear here
    </p>

    <div class="gallery" id="gallery"></div>

  </div>

</div>

</section>

<!-- =========================
     MOBILE
========================= -->
<section class="mobile-preview">

  <h2 style="font-size:36px;">
    Image Gallery
  </h2>

  <p style="
    color:#888;
    margin-top:8px;
    margin-bottom:18px;
  ">
    IAF | Personnel visual archive
  </p>

  <div class="search">
    <input
      id="mobileSearch"
      placeholder="Search unit..."
      oninput="filterUnits()"
    >
  </div>

  <div class="list" id="mobileList"></div>

  <div
    class="mobile-profile"
    id="mobileProfile"
    style="display:none;"
  >

    <h1 id="mobileName"></h1>

    <p id="mobileDesc"></p>

    <div
      class="mobile-gallery"
      id="mobileGallery"
    ></div>

  </div>

</section>

<!-- VIEWER -->
<div
  class="viewer"
  id="viewer"
  onclick="this.style.display='none'"
>
  <img id="viewerImg">
</div>

<script>

let all = [];

async function load(){

  const res =
    await fetch("../furru/data.json");

  const data =
    await res.json();

  all =
    Object.values(data.personnel);

  render(all);
}

function render(list){

  const desktop =
    document.getElementById("list");

  const mobile =
    document.getElementById("mobileList");

  desktop.innerHTML = "";
  mobile.innerHTML = "";

  list.forEach(fp=>{

    const html = `
      <div class="unit-info">

        <h3>${fp.name}</h3>

        <span>
          ${fp.model || fp.sn}
        </span>

      </div>
    `;

    /* DESKTOP CARD */
    const d =
      document.createElement("div");

    d.className = "unit";

    d.style.setProperty(
      "--bg",
      `url(${fp.profile})`
    );

    d.innerHTML = html;

    d.onclick = ()=>{

      selectDesktop(fp);
    };

    desktop.appendChild(d);

    /* MOBILE CARD */
    const m =
      document.createElement("div");

    m.className = "unit";

    m.style.setProperty(
      "--bg",
      `url(${fp.profile})`
    );

    m.innerHTML = html;

    m.onclick = ()=>{

      selectMobile(fp);

      window.scrollTo({
        top:9999,
        behavior:"smooth"
      });
    };

    mobile.appendChild(m);
  });
}

/* =========================
   DESKTOP
========================= */
function selectDesktop(fp){

  document.getElementById("bg").src =
    fp.profile || "";

  document.getElementById("name").textContent =
    fp.name || "UNKNOWN";

  document.getElementById("desc").textContent =
    fp.sn + " | " + fp.reg + " | " + fp.role
    "No description available";

  const gallery =
    document.getElementById("gallery");

  gallery.innerHTML = "";

  addDesktopImage(fp.profile);

  (fp.outfits || []).forEach(img=>{

    addDesktopImage(img);
  });
}

function addDesktopImage(src){

  const img =
    document.createElement("img");

  img.src = src;

  img.onclick = ()=>{

    openViewer(src);
  };

  document
    .getElementById("gallery")
    .appendChild(img);
}

/* =========================
   MOBILE
========================= */
function selectMobile(fp){

  document.getElementById(
    "mobileProfile"
  ).style.display = "block";

  document.getElementById(
    "mobileName"
  ).textContent =
    fp.name || "UNKNOWN";

  document.getElementById(
    "mobileDesc"
  ).textContent =
    fp.sn + " | " + fp.reg + " | " + fp.role
    "No description available";

  const gallery =
    document.getElementById(
      "mobileGallery"
    );

  gallery.innerHTML = "";

  addMobileImage(fp.profile);

  (fp.outfits || []).forEach(img=>{

    addMobileImage(img);
  });
}

function addMobileImage(src){

  const img =
    document.createElement("img");

  img.src = src;

  img.onclick = ()=>{

    openViewer(src);
  };

  document
    .getElementById("mobileGallery")
    .appendChild(img);
}

/* =========================
   VIEWER
========================= */
function openViewer(src){

  document.getElementById(
    "viewerImg"
  ).src = src;

  document.getElementById(
    "viewer"
  ).style.display = "block";
}

/* =========================
   SEARCH
========================= */
function filterUnits(){

  const desktop =
    document.getElementById("search");

  const mobile =
    document.getElementById("mobileSearch");

  const v =
    (
      desktop?.value ||
      mobile?.value ||
      ""
    )
    .toLowerCase();

  render(

    all.filter(fp =>

      (fp.name || "")
      .toLowerCase()
      .includes(v)

      ||

      (fp.sn || "")
      .toLowerCase()
      .includes(v)

      ||

      (fp.model || "")
      .toLowerCase()
      .includes(v)
    )
  );
}

load();

</script>

</body>
</html>
