
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>WRKOS Browser</title>

<style>
*{
  box-sizing:border-box;
  margin:0;
  padding:0;
}

body{
  font-family:Arial, Helvetica, sans-serif;
  background:#000;
  color:#fff;
  overflow:hidden;
}

/* =========================
   TOPBAR
========================= */
.topbar{
  position:fixed;
  top:0;
  left:0;
  width:100%;

  padding:20px 30px;

  display:flex;
  justify-content:space-between;
  align-items:center;

  z-index:999;

  pointer-events:none;
}

.logo{
  display:flex;
  align-items:center;
  gap:10px;
}

.logo img{
  height:34px;
}

.logo span{
  font-size:14px;
  font-weight:700;
  letter-spacing:2px;
}

/* =========================
   LAYOUT
========================= */
.hero{
  width:100%;
  height:100vh;
  display:flex;
}

/* =========================
   SIDEBAR TABS
========================= */
.hero-right{
  width:420px;
  height:100vh;

  display:flex;
  flex-direction:column;

  padding:90px 30px 20px;

  background:#050505;
  border-right:1px solid rgba(255,255,255,.06);

  position:relative;
  z-index:5;
}

.header{
  margin-bottom:24px;
}

.header h1{
  font-size:52px;
  margin-bottom:8px;
}

.header p{
  font-size:13px;
  color:#777;
}

/* SEARCH BAR */
.browser-input{
  display:flex;
  gap:10px;
  margin-bottom:18px;
}

.browser-input input{
  flex:1;
  height:48px;

  border:none;
  outline:none;

  padding:0 16px;

  background:#141414;
  color:#fff;

  border-radius:14px;
}

.browser-input button{
  width:58px;
  border:none;
  border-radius:14px;

  background:#fff;
  color:#000;

  cursor:pointer;
  font-weight:700;
}

/* QUICK APPS */
.quick{
  display:flex;
  gap:10px;
  margin-bottom:20px;
}

.quick button{
  flex:1;
  height:44px;

  border:none;
  border-radius:12px;

  background:rgba(255,255,255,.06);
  border:1px solid rgba(255,255,255,.08);

  color:#fff;
  cursor:pointer;
}

.quick button:hover{
  background:rgba(255,255,255,.12);
}

/* TAB LIST */
.tabs{
  flex:1;
  overflow:auto;

  display:flex;
  flex-direction:column;
  gap:12px;
}

.tab{
  position:relative;

  padding:18px;
  border-radius:18px;

  background:rgba(255,255,255,.04);
  border:1px solid rgba(255,255,255,.08);

  cursor:pointer;

  transition:.22s;
}

.tab:hover{
  background:rgba(255,255,255,.08);
  transform:translateX(4px);
}

.tab.active{
  background:rgba(255,255,255,.14);
  border-color:rgba(255,255,255,.18);
}

.tab-title{
  font-size:15px;
  margin-bottom:4px;
}

.tab-url{
  font-size:11px;
  color:#888;

  overflow:hidden;
  text-overflow:ellipsis;
  white-space:nowrap;
}

.close{
  position:absolute;
  top:12px;
  right:12px;

  width:26px;
  height:26px;

  border-radius:8px;

  display:flex;
  align-items:center;
  justify-content:center;

  background:rgba(255,255,255,.05);

  font-size:12px;
}

.footer{
  margin-top:14px;
  font-size:11px;
  color:#666;
}

/* =========================
   WORKSPACE
========================= */
.hero-left{
  flex:1;
  position:relative;
  overflow:hidden;
  background:#000;
}

/* WALLPAPER */
.wallpaper{
  position:absolute;
  inset:0;
  z-index:1;
}

.wallpaper img{
  width:100%;
  height:100%;
  object-fit:cover;

  filter:
    grayscale(100%)
    brightness(.5);
}

.wallpaper::after{
  content:"";

  position:absolute;
  inset:0;

  background:
    linear-gradient(
      to top,
      rgba(0,0,0,.55),
      rgba(0,0,0,.1)
    );
}

/* =========================
   WEBVIEW
========================= */
.browser-shell{
  position:absolute;
  inset:0;

  z-index:2;

  display:flex;
  flex-direction:column;
}

.browser-top{
  height:72px;

  display:flex;
  align-items:center;
  justify-content:space-between;

  padding:0 22px;

  background:rgba(0,0,0,.72);
  backdrop-filter:blur(16px);

  border-bottom:1px solid rgba(255,255,255,.08);
}

.browser-meta h2{
  font-size:15px;
  margin-bottom:4px;
}

.browser-meta span{
  font-size:11px;
  color:#888;
}

.browser-actions{
  display:flex;
  gap:10px;
}

.browser-actions button{
  width:42px;
  height:42px;

  border:none;
  border-radius:12px;

  background:rgba(255,255,255,.06);
  border:1px solid rgba(255,255,255,.08);

  color:#fff;
  cursor:pointer;
}

.browser-actions button:hover{
  background:rgba(255,255,255,.12);
}

/* ELECTRON WEBVIEW */
webview{
  flex:1;
  width:100%;
  background:#000;
}

/* EMPTY */
.empty{
  position:absolute;
  left:60px;
  bottom:60px;

  z-index:2;

  max-width:520px;
}

.empty h1{
  font-size:64px;
  margin-bottom:10px;
}

.empty p{
  color:#aaa;
  line-height:1.7;
}

/* MOBILE */
@media(max-width:900px){

  .hero-right{
    width:100%;
    position:absolute;
    inset:0;

    background:rgba(0,0,0,.78);
    backdrop-filter:blur(14px);
  }

  .hero-left{
    display:none;
  }

}
</style>
</head>
<body>

<div class="topbar">

  <div class="logo">
    <img src="iaf-logo.png">
    <span>WRKOS</span>
  </div>

</div>

<section class="hero">

  <!-- SIDEBAR -->
  <div class="hero-right">

    <div class="header">
      <h1>WRKOS</h1>
      <p>Electron Workspace Browser</p>
    </div>

    <!-- URL BAR -->
    <div class="browser-input">

      <input
        id="urlInput"
        placeholder="Search or enter URL"
      >

      <button onclick="openURL()">
        GO
      </button>

    </div>

    <!-- QUICK LINKS -->
    <div class="quick">

      <button onclick="createTab('Google','https://google.com')">
        Google
      </button>

      <button onclick="createTab('YouTube','https://youtube.com')">
        YouTube
      </button>

      <button onclick="createTab('Facebook','https://facebook.com')">
        Facebook
      </button>

    </div>

    <!-- TABS -->
    <div class="tabs" id="tabs"></div>

    <div class="footer">
      © 2026 IAF Digital Engineering — WRKOS
    </div>

  </div>

  <!-- WORKSPACE -->
  <div class="hero-left">

    <!-- WALLPAPER -->
    <div class="wallpaper">
      <img src="img/pic/Nami.png">
    </div>

    <!-- EMPTY -->
    <div class="empty" id="empty">
      <h1>Workspace</h1>
      <p>
        Open website to create browser tabs.
      </p>
    </div>

    <!-- WEBVIEW -->
    <div class="browser-shell">

      <div class="browser-top">

        <div class="browser-meta">
          <h2 id="currentTitle">No Active Tab</h2>
          <span id="currentURL">electron://workspace</span>
        </div>

        <div class="browser-actions">

          <button onclick="goBack()">
            ←
          </button>

          <button onclick="goForward()">
            →
          </button>

          <button onclick="reloadPage()">
            ↻
          </button>

        </div>

      </div>

      <webview
        id="browser"
        src=""
        allowpopups
      ></webview>

    </div>

  </div>

</section>

<script>

const browser = document.getElementById('browser');
const tabsEl = document.getElementById('tabs');
const currentTitle = document.getElementById('currentTitle');
const currentURL = document.getElementById('currentURL');
const empty = document.getElementById('empty');

let tabs = [];
let active = -1;

function renderTabs(){

  tabsEl.innerHTML = '';

  tabs.forEach((tab,index)=>{

    const div = document.createElement('div');

    div.className = 'tab';

    if(index === active){
      div.classList.add('active');
    }

    div.innerHTML = `
      <div class="tab-title">${tab.title}</div>
      <div class="tab-url">${tab.url}</div>
      <div class="close">✕</div>
    `;

    div.onclick = ()=>{
      switchTab(index);
    };

    div.querySelector('.close').onclick = (e)=>{

      e.stopPropagation();

      closeTab(index);

    };

    tabsEl.appendChild(div);

  });

}

function createTab(title,url){

  tabs.push({ title, url });

  active = tabs.length - 1;

  browser.src = url;

  currentTitle.textContent = title;
  currentURL.textContent = url;

  empty.style.display = 'none';

  renderTabs();

}

function switchTab(index){

  active = index;

  browser.src = tabs[index].url;

  currentTitle.textContent = tabs[index].title;
  currentURL.textContent = tabs[index].url;

  renderTabs();

}

function closeTab(index){

  tabs.splice(index,1);

  if(!tabs.length){

    active = -1;

    browser.src = '';

    currentTitle.textContent = 'No Active Tab';
    currentURL.textContent = 'electron://workspace';

    empty.style.display = 'block';

    renderTabs();

    return;

  }

  if(active >= tabs.length){
    active = tabs.length - 1;
  }

  switchTab(active);

}

function openURL(){

  let url =
    document.getElementById('urlInput')
    .value
    .trim();

  if(!url) return;

  if(!url.startsWith('http')){

    url = 'https://' + url;

  }

  let title = new URL(url).hostname;

  createTab(title,url);

}

function goBack(){

  if(browser.canGoBack()){
    browser.goBack();
  }

}

function goForward(){

  if(browser.canGoForward()){
    browser.goForward();
  }

}

function reloadPage(){

  browser.reload();

}

</script>
</body>
</html>
