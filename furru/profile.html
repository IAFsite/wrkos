<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>WRKOS | Profile</title>

<style>

*{
  box-sizing:border-box;
  margin:0;
  padding:0;
}

body{
  font-family:Arial, Helvetica, sans-serif;
  background:#000;
  color:#fff;
}

/* =========================
   HERO
========================= */

.hero{
  position:relative;
  width:100%;
  min-height:100vh;
  overflow:hidden;
}

.hero img.bg{
  position:fixed;
  inset:0;

  width:100%;
  height:100%;

  object-fit:cover;

  filter:
    brightness(.45)
    blur(2px);

  transform:scale(1.05);

  z-index:-2;
}

.hero::after{
  content:"";
  position:fixed;
  inset:0;

  background:
    linear-gradient(
      to top,
      rgba(0,0,0,.95),
      rgba(0,0,0,.45)
    );

  z-index:-1;
}

/* =========================
   TOPBAR
========================= */

.topbar{
  position:fixed;
  top:0;
  left:0;
  width:100%;

  padding:20px;

  display:flex;
  justify-content:space-between;
  align-items:center;

  z-index:999;
}

.back-btn{
  text-decoration:none;
  color:#fff;

  background:rgba(20,20,20,.6);
  backdrop-filter:blur(10px);

  padding:10px 16px;
  border-radius:999px;

  font-size:13px;
}

.logo{
  display:flex;
  align-items:center;
  gap:10px;
}

.logo img{
  height:32px;
}

.logo span{
  font-size:13px;
  font-weight:700;
  letter-spacing:2px;
}

/* =========================
   CONTENT
========================= */

.content{
  padding:
    110px
    22px
    40px;
}

h1{
  font-size:52px;
  margin-bottom:10px;
}

.desc{
  color:#bbb;
  line-height:1.6;
  margin-bottom:22px;
}

/* =========================
   INFO GRID
========================= */

.info-grid{
  display:grid;
  grid-template-columns:1fr;
  gap:10px;

  margin-bottom:24px;
}

.info-box{
  background:rgba(0,0,0,.45);

  backdrop-filter:blur(10px);

  border:
    1px solid
    rgba(255,255,255,.08);

  padding:14px;
  border-radius:12px;

  font-size:13px;
}

/* =========================
   GALLERY
========================= */

.gallery{
  display:flex;
  flex-direction:column;
  gap:12px;
}

.gallery img{
  width:100%;
  border-radius:14px;
  object-fit:cover;
}

/* =========================
   VIEWER
========================= */

.viewer{
  position:fixed;
  inset:0;

  display:none;
  z-index:9999;
}

.viewer::before{
  content:"";
  position:absolute;
  inset:0;

  background:rgba(0,0,0,.88);
  backdrop-filter:blur(12px);
}

.viewer img{
  position:absolute;
  left:50%;
  top:50%;

  transform:
    translate(-50%,-50%);

  width:92%;
  max-height:90%;

  object-fit:contain;
}

</style>
</head>

<body>

<div class="hero">

  <img class="bg" id="bg">

  <div class="topbar">

    <a
      class="back-btn"
      href="index.html"
    >
      ← Back
    </a>

    <div class="logo">
      <img src="../iaf-logo.png">
      <span>WRKOS</span>
    </div>

  </div>

  <div class="content">

    <h1 id="name">
      Loading...
    </h1>

    <div
      class="desc"
      id="desc"
    ></div>

    <div
      class="info-grid"
      id="info"
    ></div>

    <div
      class="gallery"
      id="gallery"
    ></div>

  </div>

</div>

<div
  class="viewer"
  id="viewer"
  onclick="this.style.display='none'"
>
  <img id="viewerImg">
</div>

<script>

async function load(){

  const params =
    new URLSearchParams(location.search);

  const id = params.get("id");

  const res =
    await fetch("data.json");

  const data =
    await res.json();

  const fp =
    data.personnel[id];

  if(!fp) return;

  document.getElementById("bg").src =
    fp.profile;

  document.getElementById("name").textContent =
    fp.name;

  document.getElementById("desc").textContent =
    fp.subtitle ||
    fp.model;

  const info =
    document.getElementById("info");

  [
    ["SN", fp.sn],
    ["REG", fp.reg],
    ["Model", fp.model],
    ["Sex", fp.sex],
    ["Role", fp.role],
    ["Height", fp.height_no_ears+" cm"],
    ["Height + Ear", fp.height_with_ears+" cm"],
  ].forEach(f=>{

    if(!f[1]) return;

    const box =
      document.createElement("div");

    box.className =
      "info-box";

    box.textContent =
      `${f[0]}: ${f[1]}`;

    info.appendChild(box);
  });

  const gallery =
    document.getElementById("gallery");

  [
    fp.profile,
    ...(fp.outfits || [])
  ].forEach(img=>{

    const i =
      document.createElement("img");

    i.src = img;

    i.onclick = ()=>{

      document.getElementById(
        "viewerImg"
      ).src = img;

      document.getElementById(
        "viewer"
      ).style.display = "block";
    };

    gallery.appendChild(i);
  });
}

load();

</script>

</body>
</html>
