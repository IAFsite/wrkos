<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>WRKOS | Furru Units</title>

<style>
*{
  box-sizing:border-box;
  margin:0;
  padding:0;
}

body{
  font-family:Arial, Helvetica, sans-serif;
  background:#000;
  color:#fff;
  overflow:hidden;
}

/* =========================
   TOPBAR
========================= */
.topbar{
  position:fixed;
  top:0;
  left:0;
  width:100%;
  padding:20px 30px;

  display:flex;
  justify-content:space-between;
  align-items:center;

  z-index:999;
}

.logo{
  display:flex;
  align-items:center;
  gap:10px;
  pointer-events:auto;
}

.logo img{
  height:34px;
}

.logo span{
  font-size:14px;
  font-weight:700;
  letter-spacing:2px;
}

.back-btn{
  pointer-events:auto;
  text-decoration:none;
  color:#fff;
  background:rgba(20,20,20,.6);
  backdrop-filter:blur(10px);
  padding:10px 16px;
  border-radius:999px;
  font-size:13px;
}

/* =========================
   LAYOUT
========================= */
.hero{
  width:100%;
  height:100vh;
  display:flex;
}

/* =========================
   LEFT CATALOG
========================= */
.hero-right{
  width:520px;
  height:100vh;

  display:flex;
  flex-direction:column;

  padding:90px 40px 20px;
  background:#050505;
  border-right:1px solid rgba(255,255,255,.06);
}

.hero-right h2{
  font-size:38px;
}

.hero-right p{
  font-size:13px;
  color:#888;
  margin-bottom:18px;
}

/* SEARCH */
.search input{
  width:100%;
  padding:12px 14px;
  border-radius:10px;
  border:none;
  outline:none;
  background:#14141b;
  color:#fff;
  margin-bottom:16px;
}

/* LIST */
.list{
  flex:1;
  overflow:auto;
  display:flex;
  flex-direction:column;
  gap:12px;
  padding-right:4px;
}

/* =========================
   UNIT CARD
========================= */
.unit{
  position:relative;
  overflow:hidden;

  min-height:100px;

  display:flex;
  align-items:flex-end;

  padding:16px;
  border-radius:14px;

  cursor:pointer;

  border:1px solid rgba(255,255,255,.08);

  transition:.25s;
  isolation:isolate;
}

/* background image */
.unit::before{
  content:"";
  position:absolute;
  inset:0;

  background-image:var(--bg);
  background-size:cover;
  background-position:center;

  filter:blur(2px);
  transform:scale(1.1);

  z-index:-2;
}

/* dark overlay */
.unit::after{
  content:"";
  position:absolute;
  inset:0;

  background:
    linear-gradient(
      to top,
      rgba(0,0,0,.88),
      rgba(0,0,0,.35)
    );

  z-index:-1;
}

.unit:hover{
  transform:translateY(-2px);
  border-color:rgba(255,255,255,.18);
}

.unit-info h3{
  font-size:18px;
  margin-bottom:2px;
}

.unit-info span{
  font-size:12px;
  color:#bdbdbd;
}

/* FOOTER */
.footer{
  margin-top:10px;
  font-size:11px;
  color:#666;
}

/* =========================
   RIGHT PROFILE
========================= */
.hero-left{
  flex:1;
  position:relative;
  overflow:hidden;
  background:#000;
}

/* wallpaper */
.hero-left img{
  width:100%;
  height:100%;
  object-fit:cover;
  object-position:center;
  transition:.3s;
}

#bg[src=""]{
  opacity:0;
}


/* PROFILE */
.profile{
  position:absolute;
  left:60px;
  bottom:60px;
  max-width:650px;
  z-index:2;
}

.profile h1{
  font-size:62px;
}

.profile p{
  color:#bbb;
  margin-top:6px;
  line-height:1.5;
}

/* INFO GRID */
.info-grid{
  display:grid;
  grid-template-columns:repeat(2,1fr);
  gap:10px;
  margin-top:14px;
}

.info-box{
  background:rgba(0,0,0,.45);
  backdrop-filter:blur(10px);
  border:1px solid rgba(255,255,255,.08);
  padding:10px;
  border-radius:10px;
  font-size:12px;
}

/* OUTFIT */
.outfit{
  margin-top:18px;
}

.outfit-grid{
  display:flex;
  gap:8px;
  flex-wrap:wrap;
}

.outfit-grid img{
  width:110px;
  height:75px;
  object-fit:cover;
  border-radius:10px;
  cursor:pointer;
  transition:.2s;
}

.outfit-grid img:hover{
  transform:scale(1.05);
}

/* =========================
   MOBILE MODE
========================= */
@media(max-width:900px){

  .hero-right{
    width:100%;
    height:100vh;
  }

  .hero-left{
    display:none;
  }
}

/* =========================
   VIEWER
========================= */
.viewer{
  position:absolute;
  top:0;
  right:0;
  width:calc(100% - 480px);
  height:100%;

  display:none;
  z-index:50;
}

.viewer::before{
  content:"";
  position:absolute;
  inset:0;
  background:rgba(0,0,0,.65);
  backdrop-filter:blur(10px);
}

.viewer img{
  position:absolute;
  left:50%;
  top:50%;
  transform:translate(-50%,-50%);

  width:80%;
  max-height:90%;

  object-fit:contain;
  border-radius:16px;

  box-shadow:0 40px 120px rgba(0,0,0,.7);
}
</style>
</head>

<body>

<div class="topbar">

  <a class="back-btn" href="../index.html">
    ← Back
  </a>

  <div class="logo">
    <img src="../iaf-logo.png">
    <span>WRKOS</span>
  </div>

</div>

<section class="hero">

<!-- CATALOG -->
<div class="hero-right">

  <h2>Furru Units</h2>
  <p>IAF | Personnel catalog</p>

  <div class="search">
    <input
      id="search"
      placeholder="Search..."
      oninput="filterUnits()"
    >
  </div>

  <div class="list" id="list"></div>

  <div class="footer">
    © 2026 IAF Digital Engineering — WRKOS
  </div>

</div>

<!-- PROFILE -->
<div class="hero-left">

  <img id="bg" src="">

  <div class="profile">

    <h1 id="name">SELECT UNIT</h1>

    <p id="desc">
      Personnel profile will appear here
    </p>

    <div class="info-grid" id="info"></div>

    <div class="outfit">
      <div class="outfit-grid" id="outfits"></div>
    </div>

  </div>

</div>

</section>

<!-- VIEWER -->
<div
  class="viewer"
  id="viewer"
  onclick="this.style.display='none'"
>
  <img id="viewerImg">
</div>

<script>

let all = [];

async function load(){

  const res = await fetch("data.json");
  const data = await res.json();

  all = Object.values(data.personnel);

  render(all);
}

function render(list){

  const el = document.getElementById("list");

  el.innerHTML = "";

  list.forEach(fp=>{

    const div = document.createElement("div");

    div.className = "unit";

    div.style.setProperty(
      "--bg",
      `url(${fp.profile})`
    );

    div.innerHTML = `
      <div class="unit-info">
        <h3>${fp.name}</h3>
        <span>${fp.model || fp.sn}</span>
      </div>
    `;

    div.onclick = ()=>{

      /* MOBILE MODE */
      if(window.innerWidth < 900){

        window.location.href =
          "profile.html?id=" + fp.sn;

        return;
      }

      select(fp);
    };

    el.appendChild(div);
  });
}

function select(fp){

  document.getElementById("bg").src =
    fp.profile || "";

  document.getElementById("name").textContent =
    fp.name || "UNKNOWN";

  document.getElementById("desc").textContent =
    fp.description ||
    `${fp.model || "UNKNOWN"} | ${fp.sn || "NO-SN"}`;

  const info =
    document.getElementById("info");

  info.innerHTML = "";

  [
    ["SN", fp.sn],
    ["REG", fp.reg],
    ["Model", fp.model],
    ["Sex", fp.sex],
    ["Height", fp.height_no_ears + " cm"],
    ["Height + Ear", fp.height_with_ears + " cm"],
    ["Role", fp.role],
  ].forEach(f=>{

    if(!f[1]) return;

    const box =
      document.createElement("div");

    box.className = "info-box";

    box.textContent =
      `${f[0]}: ${f[1]}`;

    info.appendChild(box);
  });

  const outfit =
    document.getElementById("outfits");

  outfit.innerHTML = "";

  (fp.outfits || []).forEach(img=>{

    const i =
      document.createElement("img");

    i.src = img;

    i.onclick = ()=>{

      document.getElementById("viewerImg").src =
        img;

      document.getElementById("viewer").style.display =
        "flex";
    };

    outfit.appendChild(i);
  });
}

function filterUnits(){

  const v =
    document.getElementById("search")
    .value
    .toLowerCase();

  render(
    all.filter(fp =>

      (fp.name || "")
      .toLowerCase()
      .includes(v)

      ||

      (fp.sn || "")
      .toLowerCase()
      .includes(v)

      ||

      (fp.model || "")
      .toLowerCase()
      .includes(v)
    )
  );
}

load();

</script>

</body>
</html>
