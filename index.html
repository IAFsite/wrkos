<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>WRKOS</title>
<link rel="manifest" href="manifest.json">

<meta name="theme-color" content="#000000">
<style>
*{
  box-sizing:border-box;
  margin:0;
  padding:0;
}

body{
  font-family:Arial, Helvetica, sans-serif;
  background:#000;
  color:#fff;
  overflow:hidden;
}

/* =========================
   TOPBAR
========================= */
.topbar{
  position:fixed;
  top:0;
  left:0;
  width:100%;
  padding:22px 34px;
  display:flex;
  justify-content:flex-end;
  align-items:center;
  z-index:999;
}

.logo{
  display:flex;
  align-items:center;
  gap:12px;
}

.logo img{
  height:34px;
  width:auto;
}

.logo span{
  font-weight:700;
  letter-spacing:2px;
  font-size:14px;
}

/* =========================
   DESKTOP LAYOUT
========================= */
.hero{
  width:100%;
  height:100vh;
  display:flex;
}

/* UI TRAY */
.hero-right{
  width:520px;
  height:100vh;

  display:flex;
  flex-direction:column;
  justify-content:space-between;

  padding:90px 50px 30px;

  background:#050505;
  border-right:1px solid rgba(255,255,255,.06);
}

/* WRAPPER */
.content{
  display:flex;
  flex-direction:column;
  gap:45px;
}

/* HEADER */
.header h1{
  font-size:64px;
  font-weight:700;
  letter-spacing:-2px;
  margin-bottom:10px;
}

.header p{
  color:#8d8d8d;
  font-size:15px;
  letter-spacing:.5px;
}

/* APPS */
.apps{
  display:flex;
  flex-direction:column;
  gap:14px;
}

.app{
  display:flex;
  align-items:center;
  gap:18px;

  padding:18px 20px;
  border-radius:18px;

  background:rgba(255,255,255,.04);
  border:1px solid rgba(255,255,255,.08);

  cursor:pointer;
  transition:.22s;

  text-decoration:none;
  color:inherit;
}

.app:hover{
  background:rgba(255,255,255,.09);
  transform:translateX(6px);
}

.icon{
  width:52px;
  height:52px;
  border-radius:14px;

  display:flex;
  align-items:center;
  justify-content:center;

  font-size:20px;

  background:rgba(255,255,255,.06);
  border:1px solid rgba(255,255,255,.08);
}

.info h3{
  font-size:16px;
  margin-bottom:4px;
}

.info span{
  font-size:13px;
  color:#8a8a8a;
  line-height:1.4;
}

/* FOOTER (LOCK BOTTOM) */
.footer{
  color:#666;
  font-size:12px;
  letter-spacing:1px;
}

/* =========================
   WALLPAPER
========================= */
.hero-left{
  flex:1;
  position:relative;
  overflow:hidden;
  background:#000;
}

.hero-left img{
  width:100%;
  height:100%;
  object-fit:cover;
  object-position:center;
  display:block;
  filter:grayscale(100%) brightness(.65);
}

/* =========================
   MOBILE
========================= */
@media(max-width:900px){

  .hero{
    display:block;
  }

  .hero-left{
    position:absolute;
    inset:0;
    z-index:0;
  }

  .hero-right{
    position:relative;
    z-index:2;

    width:100%;
    height:100vh;

    border:none;
    background:rgba(0,0,0,.72);
    backdrop-filter:blur(12px);
  }

  .header h1{
    font-size:46px;
  }
}
</style>
</head>
<script>

if("serviceWorker" in navigator){

  navigator.serviceWorker
  .register("./sw.js");

}

</script>
<body>

<div class="topbar">
  <div class="logo">
    <img src="iaf-logo.png">
    <span>WRKOS</span>
  </div>
</div>

<section class="hero">

  <!-- UI TRAY -->
  <div class="hero-right">

    <div class="content">

      <div class="header">
        <h1>WRKOS</h1>
        <p>IAF | Workspace environment</p>
      </div>

      <div class="apps">

        <a href="furru/index.html" class="app">
          <div class="icon">▣</div>
          <div class="info">
            <h3>Furru Database</h3>
            <span></span>
          </div>
        </a>

        <a href="archive/index.html" class="app">
          <div class="icon">▣</div>
          <div class="info">
            <h3>Document Archive</h3>
            <span></span>
          </div>
        </a>

        <a href="picture/index.html" class="app">
          <div class="icon">▣</div>
          <div class="info">
            <h3>Picture galery</h3>
            <span></span>
          </div>
        </a>        

      </div>

    </div>

    <div class="footer">
      © 2026 IAF Digital Engineering — WRKOS
    </div>

  </div>

  <!-- WALLPAPER -->
  <div class="hero-left">
    <img src="img/pic/Nami.png">
  </div>

</section>

</body>
</html>
