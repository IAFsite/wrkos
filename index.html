<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">

<title>WRKOS</title>

<link rel="manifest" href="./manifest.json">

<meta name="theme-color" content="#000000">

<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black">

<link rel="apple-touch-icon" href="./icon-192.png">
<link rel="stylesheet" href="wrkos.css">
<link rel="stylesheet" href="home.css">
</head>
<body>

<div class="topbar">
  <div class="logo">
    <img src="iaf-logo.png">
    <span>WRKOS</span>
  </div>
</div>

<section class="hero">

  <div class="sidebar">

    <div class="content">

      <div class="header">
        <h1>WRKOS</h1>
        <p class="page-subtitle">
          IAF | Workspace environment
        </p>
      </div>

      <div class="apps">

        <a href="furru/index.html" class="app card">
          <div class="icon">▣</div>
          <div class="info">
            <h3>Furru Database</h3>
          </div>
        </a>

        <a href="archive/index.html" class="app card">
          <div class="icon">▣</div>
          <div class="info">
            <h3>Document Archive</h3>
          </div>
        </a>

        <a href="picture/index.html" class="app card">
          <div class="icon">▣</div>
          <div class="info">
            <h3>Picture Gallery</h3>
          </div>
        </a>

      </div>

    </div>

    <div class="footer">
      © 2026 IAF Digital Engineering — WRKOS
    </div>

  </div>

  <div class="workspace">
    <img
      class="wallpaper"
      src="img/pic/Nami.png"
      alt="Wallpaper"
    >
  </div>

</section>
<script>

if("serviceWorker" in navigator){

  window.addEventListener("load", async ()=>{

    try{

      await navigator.serviceWorker.register("./sw.js");

      console.log("WRKOS SW READY");

    }catch(err){

      console.log(err);

    }

  });

}

</script>

</html>
